<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매내역 - 바비톡 병원관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
/* ── Design Tokens (s.color.*) ── */
:root {
  --content-default:     #0C092A;
  --content-alter:       #494760;
  --content-subtle:      #70798F;
  --content-disabled:    #DADADF;
  --content-placeholder: #A4A3AF;
  --content-inverse:     #FFFFFF;
  --content-primary:     #5033FF;
  --content-error:       #E61A2B;
  --content-warning:     #FF8000;
  --content-success:     #5FC982;
  --container-neutral-soft:    #F7F7F9;
  --container-neutral-bright:  #FCFCFC;
  --container-neutral-inverse: #FFFFFF;
  --container-primary-default: #674DFF;
  --container-primary-subtle:  #F5F3FF;
  --container-success-subtle:  #ECF9F0;
  --container-error-subtle:    #FEECED;
  --container-warning-subtle:  #FFF7EB;
  --outline-neutral-subtle:  #ECECEF;
  --outline-primary-default: #7B64FF;
  --outline-overlay-strong:  rgba(0,0,0,0.10);
  --divider-alter: #ECECEF;
  --grey-150:#F1F1F4; --grey-200:#ECECEF; --grey-600:#7E7E8F;
  --grey-700:#605F76; --grey-800:#484760; --grey-900:#373649; --grey-1100:#272633;
  --primary-700: #7264FF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;font-feature-settings:'salt' 1,'lnum' 1,'tnum' 1;background:var(--container-neutral-soft);min-width:1280px;color:var(--content-default);line-height:1.5;}

/* Summary Cards */
.summary-cards{display:flex;gap:12px;margin:12px 0 20px;}
.summary-card{flex:1;background:#fff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;cursor:pointer;}
.summary-card--active{background:var(--container-primary-subtle);outline:1px solid #C3B8FF;outline-offset:-1px;}
.summary-card__inner{display:flex;flex-direction:column;gap:4px;}
.summary-card__label-row{display:flex;align-items:center;gap:4px;}
.summary-card__label{font-size:14px;font-weight:600;color:var(--content-alter);line-height:1.5;}
.summary-card__label--primary{color:var(--content-alter);}
.summary-card--active .summary-card__label,
.summary-card--active .summary-card__label--primary{color:var(--content-primary);}
.summary-card__badge{font-size:11px;font-weight:600;color:#897DFF;line-height:1.5;}
.summary-card__value-row{display:flex;align-items:center;gap:6px;}
.summary-card__number{font-size:20px;font-weight:700;color:var(--content-alter);line-height:1.5;font-feature-settings:'salt' 1,'kern' 0,'lnum' 1,'tnum' 1;}
.summary-card__number--primary{color:var(--content-alter);}
.summary-card--active .summary-card__number,
.summary-card--active .summary-card__number--primary{color:var(--content-primary);}
.summary-card__unit{font-size:15px;font-weight:600;line-height:1.5;}
.summary-card__unit--muted{color:var(--content-placeholder);}
.summary-card__unit--primary-sub{color:var(--content-placeholder);}
.summary-card--active .summary-card__unit--muted,
.summary-card--active .summary-card__unit--primary-sub{color:#897DFF;}
.summary-card__sep{font-size:15px;font-weight:600;color:var(--grey-200);line-height:1.5;}
.summary-card__sep--light{color:var(--grey-200);}
.summary-card--active .summary-card__sep,
.summary-card--active .summary-card__sep--light{color:#D0CBFF;}

/* GNB */
.gnb{background:#fff;border-bottom:1px solid var(--grey-200);box-shadow:0 2px 3px rgba(0,0,0,.02);height:68px;display:flex;align-items:center;justify-content:space-between;padding:10px 60px;position:sticky;top:0;z-index:200;}
.balance-box{background:#fff;border:1px solid var(--grey-150);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.balance-inner{display:flex;align-items:center;gap:4px;}
.ic-money{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.balance-amount{font-size:16px;font-weight:600;color:var(--grey-1100);font-feature-settings:'salt' 1,'kern' 0,'lnum' 1,'tnum' 1;}
.btn-charge{background:var(--primary-700);border:none;border-radius:4px;height:24px;padding:0 6px;font-size:12px;font-weight:600;color:#fff;font-family:'Pretendard',sans-serif;cursor:pointer;}
.btn-charge:hover{filter:brightness(1.08);}
.profile-box{background:var(--container-neutral-bright);border:1px solid var(--grey-200);border-radius:1000px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.profile-box:hover{background:var(--container-neutral-soft);}
.profile-avatar{width:24px;height:24px;background:#E0D8FF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--primary-700);}
.profile-name{font-size:16px;font-weight:500;color:var(--grey-700);}

/* Page Header */
.page-header{display:flex;align-items:center;justify-content:space-between;padding:24px 60px;}
.page-title{font-size:24px;font-weight:700;color:var(--grey-900);}

/* Content Area */
.content-area{padding:0 60px 24px;display:flex;flex-direction:column;}

/* Main Card */
.filter-stats-card{background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}
.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:20px 20px 0;}


/* Select Box */
.sel-wrap{position:relative;flex-shrink:0;}
.select-box{background:#fff;border:1px solid var(--outline-neutral-subtle);border-radius:8px;height:38px;padding:0 10px;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;user-select:none;transition:border-color .15s;}
.select-box:hover{border-color:var(--content-disabled);}
.select-box.open{border-color:var(--outline-primary-default);}
.select-box .sel-label{font-size:13px;font-weight:400;color:var(--grey-800);}
.select-box .sel-arrow{display:flex;align-items:center;transition:transform .18s;}
.select-box.open .sel-arrow{transform:rotate(180deg);}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:144px;background:#fff;border:1px solid var(--outline-neutral-subtle);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.04);z-index:300;padding:6px;}
.dropdown-menu.open{display:block;}
.dropdown-item{height:36px;padding:0 12px;display:flex;align-items:center;font-size:13px;font-weight:400;color:var(--content-default);border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .1s;}
.dropdown-item:hover{background:var(--container-neutral-soft);}
.dropdown-item.selected{font-weight:600;color:var(--content-primary);background:var(--container-primary-subtle);}

/* Search Field */
.search-field{background:#fff;border:1px solid var(--outline-neutral-subtle);border-radius:8px;height:38px;padding:0 10px;display:flex;align-items:center;gap:6px;flex:1;min-width:280px;max-width:400px;transition:border-color .15s;}
.search-field:focus-within{border-color:var(--outline-primary-default);}
.search-field input{border:none;outline:none;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:400;color:var(--content-default);background:transparent;width:100%;font-feature-settings:'salt' 1,'lnum' 1,'tnum' 1;}
.search-field input::placeholder{color:var(--content-placeholder);}

.btn-query{background:var(--container-neutral-soft);border:none;border-radius:8px;height:38px;padding:6px 12px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;color:var(--content-alter);cursor:pointer;white-space:nowrap;transition:background .12s;}
.btn-query:hover{background:var(--divider-alter);}
.btn-query:active{transform:scale(.97);}

/* Table Container */
.table-container{background:#fff;border-radius:16px;overflow:hidden;}
.data-row{padding:12px 20px;}

/* Chips */
.chip-group{display:flex;gap:6px;align-items:center;margin-bottom:10px;}
.chip{border:1px solid var(--outline-neutral-subtle);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:400;color:var(--content-default);cursor:pointer;white-space:nowrap;transition:all .15s;}
.chip:hover{background:var(--container-neutral-soft);}
.chip.active{background:var(--container-primary-subtle);border-color:var(--outline-primary-default);color:var(--content-primary);font-weight:600;}

/* Data Row */
.data-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;min-height:38px;}
.data-stats{display:flex;align-items:center;gap:20px;}
.stat-item{display:flex;align-items:center;gap:10px;}
.stat-label{font-size:14px;font-weight:600;color:var(--grey-600);white-space:nowrap;}
.stat-value-wrap{display:flex;align-items:center;gap:2px;}
.stat-value{font-size:14px;font-weight:600;color:var(--grey-600);font-feature-settings:'salt' 1,'kern' 0,'lnum' 1,'tnum' 1;}
.stat-unit{font-size:13px;font-weight:400;color:var(--content-placeholder);}
.stat-divider{width:1px;height:16px;background:var(--divider-alter);flex-shrink:0;}
.data-actions{display:flex;align-items:center;gap:10px;}
.data-total{font-size:13px;font-weight:400;color:var(--content-subtle);white-space:nowrap;}
.btn-outline-md{background:transparent;border:1px solid var(--outline-overlay-strong);border-radius:8px;height:38px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;color:var(--content-alter);cursor:pointer;white-space:nowrap;transition:background .12s;}
.btn-outline-md:hover{background:var(--container-neutral-soft);}
.btn-outline-md:active{transform:scale(.97);}

/* Col Edit */
.col-edit-wrap{position:relative;}
.btn-col-edit{background:#fff;border:1px solid var(--outline-overlay-strong);border-radius:8px;height:38px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:400;color:var(--content-alter);cursor:pointer;white-space:nowrap;transition:background .12s;}
.btn-col-edit:hover{background:var(--container-neutral-soft);}
.btn-col-edit.open{border-color:var(--outline-primary-default);color:var(--content-primary);}
.col-edit-panel{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--outline-neutral-subtle);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.04);z-index:300;padding:8px;min-width:160px;}
.col-edit-panel.open{display:block;}
.col-edit-title{font-size:12px;font-weight:600;color:var(--content-subtle);padding:6px 10px 4px;letter-spacing:.02em;}
.col-toggle-item{display:flex;align-items:center;height:36px;padding:0 6px;border-radius:6px;gap:4px;transition:background .1s;}
.col-toggle-item:hover{background:var(--container-neutral-soft);}
.col-toggle-item.dragging{opacity:0.35;}
.col-toggle-item.drag-over{background:var(--container-primary-subtle);outline:1px solid var(--outline-primary-default);outline-offset:-1px;}
.col-item-label{flex:1;font-size:13px;font-weight:400;color:var(--content-default);user-select:none;}
.drag-handle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:grab;}
.drag-handle:active{cursor:grabbing;}
.btn-eye{width:28px;height:28px;background:none;border:none;cursor:pointer;padding:0;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-eye:hover{background:var(--divider-alter);}

/* Table */
.tbl-wrap{border:1px solid var(--outline-neutral-subtle);border-radius:12px;overflow:hidden;overflow-x:auto;margin:0 20px;}
.tbl{width:100%;border-collapse:collapse;min-width:1400px;}
.tbl thead th{background:var(--container-neutral-soft);border-bottom:1px solid var(--outline-neutral-subtle);border-right:1px solid var(--outline-neutral-subtle);height:40px;padding:10px 12px;font-size:13px;font-weight:600;color:var(--content-alter);text-align:left;white-space:nowrap;}
.tbl thead th:last-child{border-right:none;}
.th-inner{display:flex;align-items:center;gap:6px;}
.th-help{width:16px;height:16px;display:inline-flex;align-items:center;cursor:pointer;position:relative;}
.th-help:hover .tooltip-box{display:block;}
.tooltip-box{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#484760;color:#fff;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:400;white-space:nowrap;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,.1);pointer-events:none;}
.tooltip-box::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#484760;}
.tbl tbody td{background:#fff;border-bottom:1px solid var(--outline-neutral-subtle);border-right:1px solid var(--outline-neutral-subtle);padding:10px 12px;font-size:13px;font-weight:400;color:var(--content-alter);vertical-align:middle;}
.tbl tbody td:last-child{border-right:none;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:var(--container-neutral-soft);cursor:pointer;}

/* Tags */
.tag{display:inline-flex;align-items:center;border-radius:6px;padding:4px 6px;font-size:12px;font-weight:600;white-space:nowrap;line-height:1.5;flex-shrink:0;}
.tag-neutral{background:var(--container-neutral-soft);color:var(--content-alter);}
.tag-success{background:var(--container-success-subtle);color:var(--content-success);}
.tag-error{background:var(--container-error-subtle);color:var(--content-error);}
.tag-primary{background:var(--container-primary-subtle);color:var(--content-primary);}
.tag-warning{background:var(--container-warning-subtle);color:var(--content-warning);}
.cell-null{color:var(--content-placeholder)!important;}
.align-right{text-align:right!important;}
.mono{font-feature-settings:'salt' 1,'kern' 0,'lnum' 1,'tnum' 1;}
.procedure-cell{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.procedure-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.procedure-usage{font-size:13px;font-weight:400;color:var(--content-alter);white-space:nowrap;font-feature-settings:'salt' 1,'kern' 0,'lnum' 1,'tnum' 1;}
.procedure-usage .slash{color:var(--content-disabled);}
.btn-manage{background:var(--container-primary-default);border:none;border-radius:6px;padding:4px 8px;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:filter .12s;}
.btn-manage:hover{filter:brightness(1.1);}
.btn-sms{background:transparent;border:1px solid var(--outline-neutral-subtle);border-radius:6px;padding:4px 8px;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--content-alter);cursor:pointer;white-space:nowrap;transition:background .12s;}
.btn-sms:hover{background:var(--container-neutral-soft);}
.tbl-empty{height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.tbl-empty-icon{font-size:32px;color:var(--content-disabled);}
.tbl-empty-text{font-size:14px;font-weight:400;color:var(--content-placeholder);}

/* Pagination */
.pagination-wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--outline-neutral-subtle);}
.pagination{display:flex;align-items:center;gap:4px;}
.page-btn{background:transparent;border:none;border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--content-alter);cursor:pointer;transition:background .1s;}
.page-btn:hover:not([disabled]){background:var(--container-neutral-soft);}
.page-btn.active{background:#fff;border:1px solid var(--outline-overlay-strong);color:var(--content-default);}
.page-btn[disabled]{color:var(--content-disabled);cursor:default;}
.rows-per-page{display:flex;align-items:center;gap:8px;position:relative;}
.rows-label{font-size:13px;font-weight:400;color:var(--content-subtle);}
.rows-select-box{background:#fff;border:1px solid var(--outline-neutral-subtle);border-radius:8px;height:34px;padding:0 10px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;color:var(--content-alter);cursor:pointer;user-select:none;transition:border-color .15s;}
.rows-select-box.open{border-color:var(--outline-primary-default);}
.rows-select-box .sel-arrow{display:flex;align-items:center;transition:transform .18s;}
.rows-select-box.open .sel-arrow{transform:rotate(180deg);}
.rows-dropdown{display:none;position:absolute;bottom:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--outline-neutral-subtle);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.05);z-index:300;padding:6px;min-width:100px;}
.rows-dropdown.open{display:block;}

/* Toast */
.toast-container{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{background:#2D2B40;color:#fff;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:toastIn .2s ease,toastOut .25s ease 2.2s forwards;pointer-events:auto;}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(8px)}}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:150;display:none;}
.overlay.active{display:block;}

/* CS현황 셀 */
.cs-cell{display:flex;align-items:center;gap:1px;}
.cs-toggle{cursor:pointer;transition:filter .1s;}
.cs-toggle:hover{filter:brightness(0.93);}
.cs-sep{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cs-sep svg{display:block;}

/* 구매자 셀 */
.buyer-phone{display:block;color:var(--content-subtle);font-size:12px;font-weight:400;line-height:1.5;}

/* CS메모 셀 */
.memo-cell{display:flex;align-items:center;gap:8px;width:100%;}
.memo-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--content-alter);font-size:13px;}
.btn-memo-edit{flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--content-placeholder);}
.btn-memo-edit:hover{background:var(--container-neutral-soft);}

/* 문자 전송 버튼 (outlined) */
.btn-sms-outline{background:none;border:none;outline:1px solid rgba(0,0,0,0.10);outline-offset:-1px;border-radius:6px;padding:4px 8px;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--content-alter);cursor:pointer;white-space:nowrap;}
.btn-sms-outline:hover{background:var(--container-neutral-soft);}

/* Pagination dots */
.page-dots{padding:4px 6px;font-size:12px;color:var(--content-placeholder);display:inline-flex;align-items:center;}

/* SMS Modal */
.sms-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.40);z-index:600;display:none;align-items:center;justify-content:center;}
.sms-modal-bg.active{display:flex;}
.sms-modal{background:#fff;border-radius:20px;width:480px;max-height:76vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.12);}
.sms-modal-header{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sms-modal-title{font-size:18px;font-weight:600;color:var(--content-alter);}
.sms-modal-close{width:32px;height:32px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;padding:0;}
.sms-modal-close:hover{background:var(--container-neutral-soft);}
.sms-modal-customer{padding:12px 24px 16px;border-bottom:1px solid var(--outline-neutral-subtle);flex-shrink:0;}
.sms-modal-cname{font-size:15px;font-weight:600;color:var(--content-default);}
.sms-modal-cphone{font-size:13px;font-weight:400;color:var(--content-subtle);margin-top:2px;}
.sms-history{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:16px;min-height:120px;}
.sms-history-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:13px;color:var(--content-placeholder);}
.sms-msg-item{display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
.sms-msg-bubble{background:var(--container-neutral-soft);border-radius:4px 12px 12px 12px;padding:10px 14px;font-size:13px;font-weight:400;color:var(--content-alter);line-height:1.5;max-width:84%;word-break:keep-all;}
.sms-msg-meta{font-size:11px;color:var(--content-placeholder);padding-left:2px;}
.sms-compose{padding:14px 24px 20px;border-top:1px solid var(--outline-neutral-subtle);display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.sms-compose-textarea{width:100%;height:88px;border:1px solid var(--outline-neutral-subtle);border-radius:8px;padding:10px 12px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:400;color:var(--content-alter);resize:none;outline:none;line-height:1.5;}
.sms-compose-textarea:focus{border-color:var(--outline-primary-default);}
.sms-compose-textarea::placeholder{color:var(--content-placeholder);}
.sms-compose-footer{display:flex;align-items:center;justify-content:space-between;}
.sms-char-count{font-size:12px;color:var(--content-placeholder);}
.sms-send-btn{height:38px;padding:0 20px;background:var(--container-primary-default);border:none;border-radius:8px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;}
.sms-send-btn:hover{filter:brightness(1.08);}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.20);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.active{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;width:560px;height:100vh;background:#fff;box-shadow:0 2px 50px rgba(0,0,0,.05),0 4px 50px rgba(0,0,0,.03),0 2px 150px rgba(0,0,0,.03);z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.drawer.open{transform:translateX(0);}
.drawer-header{height:68px;padding:16px 24px;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.drawer-close{width:24px;height:24px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;border-radius:4px;}
.drawer-close:hover{background:var(--container-neutral-soft);}
.drawer-title{flex:1;font-size:24px;font-weight:700;color:var(--content-alter);line-height:1.5;font-family:'Pretendard',sans-serif;}
.drawer-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.drawer-section{padding:20px 24px;}
.drawer-section+.drawer-section{border-top:1px solid var(--outline-neutral-subtle);}
.drawer-customer-name{font-size:18px;font-weight:600;color:var(--content-alter);line-height:1.5;margin-bottom:14px;}
.drawer-info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.drawer-info-label{width:72px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--content-placeholder);line-height:1.5;}
.drawer-info-value{font-size:14px;font-weight:400;color:var(--content-alter);line-height:1.5;}
.drawer-tickets-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.drawer-tickets-total{font-size:14px;font-weight:600;color:var(--content-alter);}
.drawer-tickets-expiry{display:flex;align-items:center;gap:8px;font-size:13px;}
.drawer-expiry-label{color:var(--content-placeholder);}
.drawer-expiry-date{color:var(--content-subtle);font-size:14px;}
.drawer-ticket-card{border:1px solid var(--outline-neutral-subtle);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.drawer-ticket-head{padding:14px 16px;background:var(--container-neutral-bright);display:flex;align-items:center;gap:10px;cursor:pointer;}
.drawer-ticket-head-info{flex:1;}
.drawer-ticket-name{font-size:16px;font-weight:600;color:var(--content-alter);line-height:1.5;}
.drawer-ticket-sub{font-size:13px;font-weight:400;color:var(--content-subtle);line-height:1.5;margin-top:4px;}
.drawer-ticket-chevron{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:transform .18s;}
.drawer-ticket-card.collapsed .drawer-ticket-chevron{transform:rotate(-90deg);}
.drawer-ticket-body{padding:0 16px;display:flex;flex-direction:column;}
.drawer-session-row{padding:14px 0;border-bottom:1px solid var(--outline-neutral-subtle);}
.drawer-session-row:last-child{border-bottom:none;}
.drawer-ticket-card.collapsed .drawer-ticket-body{display:none;}
.drawer-session-row{display:flex;justify-content:space-between;align-items:flex-end;}
.drawer-session-left{display:flex;flex-direction:column;gap:6px;}
.drawer-session-top{display:flex;align-items:center;gap:6px;}
.drawer-session-badge{height:20px;padding:2px 4px;border-radius:4px;font-size:11px;font-weight:600;line-height:1.5;display:inline-flex;align-items:center;}
.drawer-session-badge.used{background:var(--container-neutral-soft);color:var(--content-alter);}
.drawer-session-badge.avail{background:var(--container-success-subtle);color:var(--content-success);}
.drawer-session-num{font-size:13px;font-weight:600;color:var(--content-alter);}
.drawer-session-order{font-size:13px;color:var(--content-placeholder);}
.drawer-session-price{font-size:13px;color:var(--content-subtle);}
.drawer-session-right{display:flex;align-items:flex-end;gap:12px;}
.drawer-session-dates{display:flex;gap:12px;}
.drawer-date-item{display:flex;align-items:center;gap:4px;}
.drawer-date-label{font-size:13px;font-weight:600;color:var(--content-placeholder);white-space:nowrap;}
.drawer-date-value{font-size:13px;color:var(--content-subtle);}
.btn-use{padding:6px 10px;background:var(--container-primary-default);border:none;border-radius:6px;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap;}
.btn-use:hover{filter:brightness(1.08);}
.drawer-accordion-row{padding:20px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}

function tag(cls, text){ return '<span class="tag tag-'+cls+'">'+text+'</span>'; }

  'dataTotal':'.data-total','btnColEdit':'.btn-col-edit','colEditPanel':'.col-edit-panel',
  'tblHead':'.js-tbl-head','tblBody':'.js-tbl-body','tblEmpty':'.tbl-empty',
  'rowsBox':'.rows-select-box','rowsDropdown':'.rows-dropdown','rowsLabel':'.js-rows-lbl',
  'paginationEl':'.pagination','toastContainer':'.toast-container'
};
function $id(id){ return document.getElementById(id)||document.querySelector(CLASS_MAP[id]||null); }
function procStatus(r){
  if(r.unused === r.total) return '시술전';
  if(r.unused > 0)         return '시술중';
  return '시술완료';
}

/* ── Filter & Render ── */
function updateSummaryCards(){
  var allCount = DATA.length;
  var unusedRows = DATA.filter(function(r){ return r.unused > 0; });
  var unusedAmt  = unusedRows.reduce(function(s,r){ return s+r.amount; }, 0);
  var expiringRows = DATA.filter(function(r){ return r.expiring; });
  var expiringAmt  = expiringRows.reduce(function(s,r){ return s+r.amount; }, 0);
  document.getElementById('scardAllCount').textContent     = allCount.toLocaleString();
  var unusedTickets   = unusedRows.reduce(function(s,r){ return s+r.unused; }, 0);
  var expiringTickets = expiringRows.reduce(function(s,r){ return s+r.unused; }, 0);
  document.getElementById('scardUnusedCount').textContent  = unusedTickets.toLocaleString();
  document.getElementById('scardUnusedAmt').textContent    = unusedAmt.toLocaleString();
  document.getElementById('scardExpiringCount').textContent= expiringTickets.toLocaleString();
  document.getElementById('scardExpiringAmt').textContent  = expiringAmt.toLocaleString();
}

function applyFilters(){
  var q = st.query.trim().toLowerCase();
  st.filtered = DATA.filter(function(r){
    // card filter
    if(st.card === 'unused'   && r.unused <= 0) return false;
    if(st.card === 'expiring' && !r.expiring)   return false;
    // paystat
    var pm = {paid:'결제 완료','refund-partial':'부분환불','refund-full':'전체환불'};
    if(st.paystat !== 'all' && r.pay !== pm[st.paystat]) return false;
    // source
    if(st.source !== 'all' && r.src !== st.source) return false;
    // search
    if(q){
      var hay = [r.order,r.event,r.buyer,r.comment,r.memo].join(' ').toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  st.page = 1;
  updateStats();
  renderTable();
  renderPagination();
}

function updateStats(){
  var rows = st.filtered;
  var procCount = rows.reduce(function(s,r){ return s + (st.card === 'unused' ? r.unused : r.total); }, 0);
  var amt = rows.reduce(function(s,r){return s+r.amount;},0);
  $id('statPay').textContent   = rows.length.toLocaleString();
  $id('statProc').textContent  = procCount.toLocaleString();
  $id('statAmt').textContent   = amt.toLocaleString();
  $id('dataTotal').textContent = rows.length.toLocaleString()+'건';
}

function renderTable(){
  // Header
  var head = $id('tblHead');
  head.innerHTML = COLS.map(function(c){
    if(!st.colVis[c.key]) return '';
    var w = c.width ? 'style="width:'+c.width+'"' : (c.minWidth ? 'style="min-width:'+c.minWidth+'"' : '');
    var tip = c.tooltip ? '<span class="th-help"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="#A4A3AF"/></svg><div class="tooltip-box">'+c.tooltip+'</div></span>' : '';
    var ri = c.align==='right' ? ' style="text-align:right"' : '';
    return '<th '+w+ri+'><div class="th-inner"'+(c.align==='right'?' style="justify-content:flex-end"':'')+'>'+c.label+tip+'</div></th>';
  }).join('');

  // Body
  var tbody = $id('tblBody');
  var empty = $id('tblEmpty');
  var start = (st.page-1)*st.rpp;
  var rows = st.filtered.slice(start, start+st.rpp);

  if(!rows.length){
    tbody.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(function(r){
    var cells = COLS.map(function(c){
      if(!st.colVis[c.key]) return '';
      return '<td>'+cellHtml(c.key,r)+'</td>';
    }).join('');
    return '<tr data-order="'+r.order+'" data-buyer="'+r.buyer+'">'+cells+'</tr>';
  }).join('');
}

function cellHtml(key, r){
  switch(key){
    case 'cs':
      var visitColor = r.visit === '미내원' ? 'primary' : 'neutral';
      var csBtn  = '<span class="tag tag-'+r.cst+' cs-toggle" data-action="toggle-cs" data-order="'+r.order+'">'+r.cs+'</span>';
      var visBtn = '<span class="tag tag-'+visitColor+' cs-toggle" data-action="toggle-visit" data-order="'+r.order+'">'+r.visit+'</span>';
      return '<div class="cs-cell">'+csBtn+'<span class="cs-sep"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M10 6l6 6-6 6" stroke="#DADADF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'+visBtn+'</div>';
    case 'date':    return '<span class="mono">'+r.date+'</span>';
    case 'order':   return '<span class="mono">'+r.order+'</span>';
    case 'buyer': return r.buyer+(r.phone?'<br><span class="buyer-phone">'+r.phone+'</span>':'');
    case 'event':   return r.event;
    case 'pay':     return r.pay;
    case 'proc':
      var ps = procStatus(r);
      return '<div class="procedure-cell"><div class="procedure-left"><span class="procedure-usage mono">미사용 <strong>'+r.unused+'</strong> <span class="slash">/</span> 전체 <strong>'+r.total+'</strong></span></div><button class="btn-manage" data-action="manage" data-order="'+r.order+'">관리</button></div>';
    case 'comment': return r.comment==='-' ? '<span class="cell-null">-</span>' : r.comment;
    case 'amount':  return '<span class="mono" style="display:block;text-align:right">'+r.amount.toLocaleString()+'원</span>';
    case 'memo':
      var mt = r.memo==='-' ? '<span class="cell-null">-</span>' : r.memo;
      return '<div class="memo-cell"><span class="memo-text">'+mt+'</span><button class="btn-memo-edit" data-action="memo-edit" data-order="'+r.order+'" title="메모 수정"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="#A4A3AF"/></svg></button></div>';
    case 'sms': return '<button class="btn-sms-outline" data-action="sms" data-order="'+r.order+'">문자 전송</button>';
    default:        return '';
  }
}

/* ── Pagination ── */
function renderPagination(){
  var total = st.filtered.length;
  var pages = Math.max(1, Math.ceil(total/st.rpp));
  var cur = st.page;

  var svgL = '<svg width="20" height="20" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z" fill="'+(cur<=1?'#DADADF':'#494760')+'"/></svg>';
  var svgR = '<svg width="20" height="20" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" fill="'+(cur>=pages?'#DADADF':'#494760')+'"/></svg>';
  var dots = '<span class="page-dots">···</span>';

  var html = '<button class="page-btn arrow" data-page="'+(cur-1)+'"'+(cur<=1?' disabled':'')+'>'+svgL+'</button>';

  if(pages <= 7){
    for(var p=1;p<=pages;p++){
      html += '<button class="page-btn'+(p===cur?' active':'')+'" data-page="'+p+'">'+p+'</button>';
    }
  } else {
    if(cur <= 4){
      for(var p=1;p<=5;p++) html += '<button class="page-btn'+(p===cur?' active':'')+'" data-page="'+p+'">'+p+'</button>';
      html += dots;
      html += '<button class="page-btn" data-page="'+pages+'">'+pages+'</button>';
    } else if(cur >= pages-3){
      html += '<button class="page-btn" data-page="1">1</button>';
      html += dots;
      for(var p=pages-4;p<=pages;p++) html += '<button class="page-btn'+(p===cur?' active':'')+'" data-page="'+p+'">'+p+'</button>';
    } else {
      html += '<button class="page-btn" data-page="1">1</button>';
      html += dots;
      for(var p=cur-1;p<=cur+1;p++) html += '<button class="page-btn'+(p===cur?' active':'')+'" data-page="'+p+'">'+p+'</button>';
      html += dots;
      html += '<button class="page-btn" data-page="'+pages+'">'+pages+'</button>';
    }
  }

  html += '<button class="page-btn arrow" data-page="'+(cur+1)+'"'+(cur>=pages?' disabled':'')+'>'+svgR+'</button>';
  document.querySelector('.pagination').innerHTML = html;
}

function goPage(p){
  var pages = Math.ceil(st.filtered.length/st.rpp);
  if(p<1||p>pages) return;
  st.page = p;
  renderTable();
  renderPagination();
}

    error:  '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#FA9EA6"/></svg>',

  };
  var el = document.createElement('div');

/* ── Dropdown helpers ── */
var openDD = null;
function closeAll(){

  document.querySelectorAll('.select-box.open,.rows-select-box.open').forEach(function(b){b.classList.remove('open');});
  $id('overlay').classList.remove('active');

}
function openDropdown(boxEl, menuEl){
  var isOpen = menuEl.classList.contains('open');
  closeAll();
  if(!isOpen){
    boxEl.classList.add('open');
    menuEl.classList.add('open');

/* ── Col Edit Panel ── */
var dragHandleSvg = '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="7.5" cy="5.5" r="1.5" fill="#DADADF"/><circle cx="12.5" cy="5.5" r="1.5" fill="#DADADF"/><circle cx="7.5" cy="10" r="1.5" fill="#DADADF"/><circle cx="12.5" cy="10" r="1.5" fill="#DADADF"/><circle cx="7.5" cy="14.5" r="1.5" fill="#DADADF"/><circle cx="12.5" cy="14.5" r="1.5" fill="#DADADF"/></svg>';
var eyeOnSvg  = '<svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#70798F"/></svg>';
var eyeOffSvg = '<svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="#A4A3AF"/></svg>';

function renderColPanel(){
  var panel = $id('colEditPanel');
  panel.innerHTML = '<div class="col-edit-title">열 표시 설정</div>';
  var dragSrc = null;

  COLS.forEach(function(c){
    var item = document.createElement('div');
    item.className = 'col-toggle-item';
    item.setAttribute('draggable', 'true');
    item.dataset.colKey = c.key;
    item.innerHTML =
      '<div class="drag-handle">'+dragHandleSvg+'</div>'+
      '<span class="col-item-label">'+c.label+'</span>'+
      '<button class="btn-eye" data-col="'+c.key+'">'+(st.colVis[c.key] ? eyeOnSvg : eyeOffSvg)+'</button>';

    item.querySelector('.btn-eye').addEventListener('click', function(e){
      e.stopPropagation();
      st.colVis[c.key] = !st.colVis[c.key];
      renderColPanel();
      renderTable();
    });

    item.addEventListener('dragstart', function(e){
      dragSrc = item;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function(){ item.classList.add('dragging'); }, 0);
    });
    item.addEventListener('dragend', function(){
      item.classList.remove('dragging');
      panel.querySelectorAll('.col-toggle-item').forEach(function(i){ i.classList.remove('drag-over'); });
    });
    item.addEventListener('dragover', function(e){
      e.preventDefault();
      if(item !== dragSrc){
        panel.querySelectorAll('.col-toggle-item').forEach(function(i){ i.classList.remove('drag-over'); });
        item.classList.add('drag-over');
      }
    });
    item.addEventListener('drop', function(e){
      e.stopPropagation();
      if(dragSrc && dragSrc !== item){
        var srcKey = dragSrc.dataset.colKey, dstKey = item.dataset.colKey;
        var si=-1, di=-1;
        for(var i=0;i<COLS.length;i++){
          if(COLS[i].key===srcKey) si=i;
          if(COLS[i].key===dstKey) di=i;
        }
        if(si!==-1 && di!==-1){
          var moved = COLS.splice(si,1)[0];
          COLS.splice(di,0,moved);
          renderColPanel();
          renderTable();
        }
      }
    });

    panel.appendChild(item);
  });
}

  $id('rowsBox').addEventListener('click', function(){

  $id('tblBody').addEventListener('click', function(e){

    if(btn){
      e.stopPropagation();
      if(btn.dataset.action==='manage'||btn.dataset.action==='memo-edit'){
        var manageRow = DATA.filter(function(d){ return d.order===btn.dataset.order; })[0];
        if(manageRow) openDrawer(manageRow);
      }
      if(btn.dataset.action==='sms'){
        var smsRow = DATA.filter(function(d){ return d.order===btn.dataset.order; })[0];
        if(smsRow) openSmsModal(smsRow);
      }
      if(btn.dataset.action==='toggle-cs'){
        var row = DATA.filter(function(d){ return d.order===btn.dataset.order; })[0];
        if(row){ row.cs = row.cs==='확인'?'신규':'확인'; row.cst = row.cs==='신규'?'primary':'neutral'; renderTable(); }
      }
      if(btn.dataset.action==='toggle-visit'){
        var row = DATA.filter(function(d){ return d.order===btn.dataset.order; })[0];
        if(row){ row.visit = row.visit==='미내원'?'내원완료':'미내원'; renderTable(); }

  $id('paginationEl').addEventListener('click', function(e){

    if(!btn || btn.disabled || btn.hasAttribute('disabled')) return;
    goPage(parseInt(btn.dataset.page, 10));
  });

  // Drawer open/close
  function openDrawer(r) {
    var used = r.total - r.unused;
    var pricePerSession = Math.round(r.amount / r.total);
    var expiry = r.date.replace(/^(\d{2})-(\d{2})-\d{2}.*/, function(_,y,m){ return (parseInt(y)+1)+'-'+m+'-'+r.date.split('-')[2].split(' ')[0]+' '+r.date.split(' ')[1]; });

    var sessions = '';
    for(var i=1;i<=r.total;i++){
      var isUsed = i <= used;
      var badge = isUsed
        ? '<span class="drawer-session-badge used">사용완료</span>'
        : '<span class="drawer-session-badge avail">사용가능</span>';
      var right = isUsed
        ? '<div class="drawer-session-dates"><div class="drawer-date-item"><span class="drawer-date-label">방문일</span><span class="drawer-date-value">25-04-16</span></div><div class="drawer-date-item"><span class="drawer-date-label">사용완료일</span><span class="drawer-date-value">25-04-16</span></div></div>'
        : '<button class="btn-use" data-action="drawer-use" data-session="'+i+'">사용하기</button>';
      sessions += '<div class="drawer-session-row"><div class="drawer-session-left"><div class="drawer-session-top">'+badge+'<span class="drawer-session-num">'+i+'회차</span></div><div class="drawer-session-order">'+r.order+'</div><div class="drawer-session-price">판매금액 '+pricePerSession.toLocaleString()+'원</div></div><div class="drawer-session-right">'+right+'</div></div>';
    }

    var html =
      '<div class="drawer-section">' +
        '<div class="drawer-customer-name">'+r.buyer+' '+r.phone+'</div>' +
        '<div class="drawer-info-row"><span class="drawer-info-label">결제일</span><span class="drawer-info-value">'+r.date+' (카드결제/수수료율 2.4%)</span></div>' +
        '<div class="drawer-info-row"><span class="drawer-info-label">주문번호</span><span class="drawer-info-value">'+r.order+'</span></div>' +
        '<div class="drawer-info-row"><span class="drawer-info-label">고객 코멘트</span><span class="drawer-info-value">'+(r.comment==='-'?'-':r.comment)+'</span></div>' +
      '</div>' +
      '<div class="drawer-section">' +
        '<div class="drawer-tickets-meta"><span class="drawer-tickets-total">총 '+r.total+'회</span><div class="drawer-tickets-expiry"><span class="drawer-expiry-label">사용만료일</span><span class="drawer-expiry-date">'+expiry+'</span></div></div>' +
        '<div class="drawer-ticket-card js-ticket-card">' +
          '<div class="drawer-ticket-head js-ticket-head"><div class="drawer-ticket-head-info"><div class="drawer-ticket-name">'+r.event+'</div><div class="drawer-ticket-sub">'+r.total+'회 / 1회 기준가 '+pricePerSession.toLocaleString()+'원</div></div>' +
          '<span class="drawer-ticket-chevron"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z" fill="#70798F"/></svg></span></div>' +
          '<div class="drawer-ticket-body">'+sessions+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="drawer-section">' +
        '<div class="drawer-accordion-row js-accordion"><span class="drawer-accordion-title">결제 정보</span><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z" fill="#A4A3AF"/></svg></div>' +
        '<div class="drawer-accordion-row js-accordion" style="border-top:1px solid var(--outline-neutral-subtle)"><span class="drawer-accordion-title">정산 대상 정보</span><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z" fill="#A4A3AF"/></svg></div>' +

        '<textarea class="drawer-textarea js-drawer-memo" placeholder="메모를 남겨주세요">'+(r.memo==='-'?'':r.memo)+'</textarea>' +

      '</div>';

    document.querySelector('.js-drawer-body').innerHTML = html;
    document.querySelector('.js-drawer').classList.add('open');
    document.querySelector('.js-drawer-overlay').classList.add('active');

      toast(sessionIdx+'회차 사용처리 됐어요.', 'success');
    });

  function closeDrawer(){

  /* ── SMS Modal ── */
  function openSmsModal(r){
    document.querySelector('.js-sms-cname').textContent = r.buyer;
    document.querySelector('.js-sms-cphone').textContent = r.phone;

    var histEl = document.querySelector('.js-sms-history');
    var log = r.smsLog || [];
    if(!log.length){
      histEl.innerHTML = '<div class="sms-history-empty">전송된 문자 이력이 없어요</div>';
    } else {
      histEl.innerHTML = log.map(function(m){
        return '<div class="sms-msg-item">'
          +'<div class="sms-msg-bubble">'+m.msg+'</div>'
          +'<div class="sms-msg-meta">'+m.date+'</div>'
          +'</div>';
      }).join('');
    }

    var ta = document.querySelector('.js-sms-textarea');
    var countEl = document.querySelector('.js-sms-count');
    ta.value = '';
    countEl.textContent = '0 / 80';

    document.querySelector('.sms-modal-bg').classList.add('active');

    // char count
    ta.oninput = function(){ countEl.textContent = ta.value.length + ' / 80'; };

    // send
    document.querySelector('.js-sms-send').onclick = function(){
      var msg = ta.value.trim();
      if(!msg) return;
      if(!r.smsLog) r.smsLog = [];
      var now = new Date();
      var ds = String(now.getFullYear()).slice(2)+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
      r.smsLog.push({date:ds, msg:msg});
      var item = document.createElement('div');
      item.className = 'sms-msg-item';
      item.innerHTML = '<div class="sms-msg-bubble">'+msg+'</div><div class="sms-msg-meta">'+ds+'</div>';
      var empty = histEl.querySelector('.sms-history-empty');
      if(empty) empty.remove();
      histEl.appendChild(item);
      histEl.scrollTop = histEl.scrollHeight;
      ta.value = '';
      countEl.textContent = '0 / 80';
      toast(r.buyer+'님께 문자를 전송했어요.', 'success');
    };
  }

  function closeSmsModal(){
    document.querySelector('.sms-modal-bg').classList.remove('active');
  }
  document.querySelector('.js-sms-modal-close').addEventListener('click', closeSmsModal);
  document.querySelector('.js-sms-modal-bg').addEventListener('click', function(e){
    if(e.target === this) closeSmsModal();
  });
});
})();
